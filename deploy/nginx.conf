# Hotpot gateway: serves the React SPA and reverse-proxies API calls
# to the backend container on the internal docker network.

upstream hotpot_backend {
    server backend:8000;
}

server {
    listen 80;
    server_name _;

    # Reasonable defaults for a small SPA + API gateway.
    client_max_body_size  4m;
    proxy_read_timeout    60s;
    proxy_connect_timeout 5s;
    proxy_send_timeout    60s;

    # ----- Frontend (built React SPA) -----
    root /usr/share/nginx/html;
    index index.html;

    # Cache built assets aggressively (filenames are content-hashed by Vite).
    location /assets/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # SPA history fallback — anything not a real file goes to index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ----- API: /api/* → backend (strip /api prefix) -----
    location /api/ {
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass         http://hotpot_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ----- API docs / OpenAPI passthrough (handy during testing) -----
    location ~ ^/(docs|redoc|openapi\.json)$ {
        proxy_pass         http://hotpot_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ----- Healthcheck (gateway-level; backend has its own at /api/healthz) -----
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
