# Bootstrap list of candidate sources for the discovery queue.
#
# Loaded by `hotpot discover-sources --bootstrap` and during `score-sources`'s
# first run. Each entry is upserted into source_candidates with status=pending
# and an LLM-vetted "signal" verdict so it shows up at the top of the
# Discovery drawer for the human curator to click ✓ once.
#
# Categories:
#   - zh AI media (LLM-focused, news/analysis)
#   - zh AI lab/team blogs
#   - zh Bilibili creators (academic LLM lectures)  — bridged via RSSHub
#   - en academic / venue
#
# Notes on auth requirements:
#   - WeChat OA listings need RSSHub + (ideally) WeChat reader cookies.
#     Skipped here; we ingest WeChat articles only via user contributions.
#   - Zhihu needs the user's z_c0 cookie via RSSHub. Skipped here.
#   - Bilibili routes via RSSHub use the latter's WBI signing impl.

candidates:
  # === Tier-A: Chinese AI media (clean RSS / public HTML) ===
  - name: 量子位 (qbitai)
    url: https://www.qbitai.com/feed
    kind: rss
    language: zh
    is_llm_focused: true
    academic_depth: medium
    rationale: Top-tier Chinese AI media; native RSS feed.
    lineage: media
    signal_score: 0.92

  - name: 机器之心 (jiqizhixin)
