# Initial source seed list for Hotpot Tech Feed.
# Run with:  hotpot seed-sources --file data/seed_sources.yaml
#
# Each entry creates one Source row. Adapter dispatch is by `kind`.
# Kinds: arxiv | rss | html | github
#
# `extra` is adapter-specific JSON. For arxiv: {category, max_results}.
# For rss: {content_type, lab}.
sources:

  # ====================== arXiv categories ======================
  - name: "arXiv cs.AI"
    kind: arxiv
    url: "https://arxiv.org/list/cs.AI/recent"
    language: en
    extra: { category: "cs.AI", max_results: 50 }
    trust_score: 0.9

  - name: "arXiv cs.LG"
    kind: arxiv
    url: "https://arxiv.org/list/cs.LG/recent"
    language: en
    extra: { category: "cs.LG", max_results: 50 }
    trust_score: 0.9

  - name: "arXiv cs.CL"
    kind: arxiv
    url: "https://arxiv.org/list/cs.CL/recent"
    language: en
    extra: { category: "cs.CL", max_results: 50 }
    trust_score: 0.9

  - name: "arXiv cs.CV"
    kind: arxiv
    url: "https://arxiv.org/list/cs.CV/recent"
    language: en
    extra: { category: "cs.CV", max_results: 50 }
    trust_score: 0.9

  - name: "arXiv cs.CR"
    kind: arxiv
    url: "https://arxiv.org/list/cs.CR/recent"
    language: en
    extra: { category: "cs.CR", max_results: 30 }
    trust_score: 0.9

  - name: "arXiv cs.DC"
