# Initial source seed list for Hotpot Tech Feed.
# Run with:  hotpot seed-sources --file data/seed_sources.yaml
#
# Each entry creates one Source row. Adapter dispatch is by `kind`.
# Kinds: arxiv | rss | html | github
#
# `extra` is adapter-specific JSON. For arxiv: {category, max_results}.
# For rss: {content_type, lab}.
sources:

  # ====================== arXiv categories (recent listings) ======================
  # Bumping max_results for the first crawl. arXiv is rate-limited (~1 req / 3 sec)
  # so 14 categories × 100 = ~1400 candidate papers per run, ~45 sec wall-clock.
  - { name: "arXiv cs.AI",  kind: arxiv, url: "https://arxiv.org/list/cs.AI/recent",  language: en, extra: { category: "cs.AI",  max_results: 100 }, trust_score: 0.9 }
  - { name: "arXiv cs.LG",  kind: arxiv, url: "https://arxiv.org/list/cs.LG/recent",  language: en, extra: { category: "cs.LG",  max_results: 100 }, trust_score: 0.9 }
  - { name: "arXiv cs.CL",  kind: arxiv, url: "https://arxiv.org/list/cs.CL/recent",  language: en, extra: { category: "cs.CL",  max_results: 100 }, trust_score: 0.9 }
  - { name: "arXiv cs.CV",  kind: arxiv, url: "https://arxiv.org/list/cs.CV/recent",  language: en, extra: { category: "cs.CV",  max_results: 100 }, trust_score: 0.9 }
  - { name: "arXiv cs.CR",  kind: arxiv, url: "https://arxiv.org/list/cs.CR/recent",  language: en, extra: { category: "cs.CR",  max_results: 80  }, trust_score: 0.9 }
  - { name: "arXiv cs.DC",  kind: arxiv, url: "https://arxiv.org/list/cs.DC/recent",  language: en, extra: { category: "cs.DC",  max_results: 60  }, trust_score: 0.9 }
  - { name: "arXiv cs.DB",  kind: arxiv, url: "https://arxiv.org/list/cs.DB/recent",  language: en, extra: { category: "cs.DB",  max_results: 60  }, trust_score: 0.9 }
  - { name: "arXiv cs.SE",  kind: arxiv, url: "https://arxiv.org/list/cs.SE/recent",  language: en, extra: { category: "cs.SE",  max_results: 60  }, trust_score: 0.9 }
  - { name: "arXiv cs.OS",  kind: arxiv, url: "https://arxiv.org/list/cs.OS/recent",  language: en, extra: { category: "cs.OS",  max_results: 40  }, trust_score: 0.85 }
  - { name: "arXiv eess.SY", kind: arxiv, url: "https://arxiv.org/list/eess.SY/recent", language: en, extra: { category: "eess.SY", max_results: 40 }, trust_score: 0.85 }
  - { name: "arXiv cs.NE",  kind: arxiv, url: "https://arxiv.org/list/cs.NE/recent",  language: en, extra: { category: "cs.NE",  max_results: 40  }, trust_score: 0.85 }
  - { name: "arXiv cs.IR",  kind: arxiv, url: "https://arxiv.org/list/cs.IR/recent",  language: en, extra: { category: "cs.IR",  max_results: 40  }, trust_score: 0.85 }
  - { name: "arXiv cs.HC",  kind: arxiv, url: "https://arxiv.org/list/cs.HC/recent",  language: en, extra: { category: "cs.HC",  max_results: 40  }, trust_score: 0.85 }
  - { name: "arXiv cs.RO",  kind: arxiv, url: "https://arxiv.org/list/cs.RO/recent",  language: en, extra: { category: "cs.RO",  max_results: 40  }, trust_score: 0.85 }

